<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://primefaces.org/ui">

<h:head>
    <title>GYM SYSTEM</title>
    <link rel="stylesheet" href="https://unpkg.com/primeflex@latest/primeflex.css"/>
    <link rel="stylesheet" href="https://unpkg.com/primeflex@latest/themes/primeone-dark.css"/>
</h:head>

<h:body>
    <div class="card">
        <h:form id="clients-form">
            <p:growl id="messages" showDetails="true"/>
            <div class="card">
                <p:menubar>
                    <p:menuitem value="Home" icon="pi pi-fw pi pi-user"
                                update=":clients-form:clients-table"
                                actionListener="#{indexController.loadData}"/>
                </p:menubar>
            </div>
            <!--  DataTable  -->
            <div class="card">
                <p:dataTable value="#{indexController.clients}" var="client"
                             id="clients-table" widgetVar="clientsTable">
                    <f:facet name="header">
                        <div class="flex justify-content-center flex-wrap card-container blue-container">
                            <div class="flex align-items-center
                            justify-content-center
                            w-20rem h-4rem bg-blue-500 font-bold
                            text-white-900 border-round m-2">
                                <h3>GYM SYSTEM</h3>
                            </div>
                        </div>
                    </f:facet>

                    <p:column    headerText="Id">
                        <h:outputText value="#{client.id}"/>
                    </p:column>

                    <p:column    headerText="Name">
                        <h:outputText value="#{client.nombre}"/>
                    </p:column>

                    <p:column    headerText="Last Name">
                        <h:outputText value="#{client.apellido}"/>
                    </p:column>

                    <p:column    headerText="Membership">
                        <h:outputText value="#{client.membresia}"/>
                    </p:column>

                </p:dataTable>
            </div>
        </h:form>
    </div>

</h:body>

</html>
